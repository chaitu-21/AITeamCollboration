version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    # If you later switch back to Postgres, you would add database env vars here
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass the backend URL so Vite can bake it into the production build
        - VITE_API_BASE_URL=http://localhost:5000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
